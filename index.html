<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Planner · 미리보기</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#192338; --side:#12192b; --side-ink:#aebdd8; --side-hover:#22304f;
    --card:#1e2e4f; --ink:#d9e1f1; --muted:#8ba0c4; --line:#2c3f66;
    --accent:#8fb3e2; --accent-soft:#223357; --on-accent:#16233f; --good:#6a9a88; --bad:#cf7f7f;
    --shadow:0 4px 18px rgba(0,0,0,.45); --input:#172642;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--ink);line-height:1.6}
  h1,h2,h3,.brand{font-family:'Gowun Dodum',sans-serif}
  button{font-family:inherit;cursor:pointer;border:none;border-radius:9px;transition:.12s}
  input,textarea,select{font-family:inherit;font-size:14px;border:1px solid var(--line);border-radius:9px;padding:9px 11px;background:var(--input);color:var(--ink);width:100%}
  input:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent)}
  input[type=range]{accent-color:var(--accent);padding:0}
  input[type=date],input[type=time]{cursor:pointer}
  input[type=date]::-webkit-calendar-picker-indicator,input[type=time]::-webkit-calendar-picker-indicator{filter:invert(0.85);cursor:pointer;opacity:.85;font-size:16px}
  .hidden{display:none!important}

  .demo-banner{background:#1a2947;color:#8fb3e2;text-align:center;font-size:12.5px;padding:7px}

  .layout{display:flex;min-height:100vh}
  .topbar{display:none;align-items:center;gap:10px;padding:10px 14px;background:var(--side);position:sticky;top:0;z-index:40;border-bottom:1px solid var(--line)}
  .topbar .hamb{background:transparent;border:none;color:var(--ink);padding:4px;cursor:pointer}
  .topbar .hamb svg{width:24px;height:24px}
  .topbar .tb-title{font-family:'Gowun Dodum',sans-serif;font-weight:500;font-size:17px;margin-left:auto}
  .side-close{display:none}
  .side-collapse{margin-left:auto;background:transparent;border:none;color:#5b6a8a;padding:4px;cursor:pointer;border-radius:6px}
  .side-collapse svg{width:18px;height:18px}
  .side-collapse:hover{color:var(--accent);background:var(--side-hover)}
  .copyright-fixed{position:fixed;right:14px;bottom:9px;font-size:11px;color:#46567a;z-index:20;pointer-events:none}
  .lock{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
  .lock-card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:36px 28px;width:100%;max-width:320px;text-align:center;box-shadow:var(--shadow)}
  .lock-logo{color:var(--accent);margin-bottom:12px}
  .lock-logo svg{width:34px;height:34px}
  .lock-card h1{font-size:22px;margin-bottom:4px}
  .lock-card p{color:var(--muted);font-size:13.5px;margin-bottom:18px}
  .lock-card input{text-align:center;margin-bottom:12px;font-size:16px;letter-spacing:3px}
  .lock-card button{width:100%;background:var(--accent);color:var(--on-accent);font-weight:700;padding:12px;border-radius:10px;cursor:pointer}
  .lock-msg{color:var(--bad);font-size:13px;min-height:18px;margin-top:8px}
  @media(min-width:761px){
    .layout.collapsed aside{width:58px;flex-basis:58px;padding-left:8px;padding-right:8px}
    .layout.collapsed .brand{justify-content:center;padding:6px 0 12px}
    .layout.collapsed .brand>svg,.layout.collapsed .brand>i,.layout.collapsed .brand span{display:none}
    .layout.collapsed .side-collapse{margin-left:0}
    .layout.collapsed .nav-sec{display:none}
    .layout.collapsed .lab{display:none}
    .layout.collapsed aside nav button{justify-content:center;padding:11px 0;gap:0}
    .layout.collapsed .side-foot{display:none}
  }
  .backdrop{display:none}
  .backdrop.show{display:block;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:55}
  aside{width:210px;flex:0 0 210px;background:var(--side);color:var(--side-ink);padding:18px 12px;position:sticky;top:0;height:100vh;overflow:hidden;display:flex;flex-direction:column}
  aside nav{flex:1;overflow-y:auto;min-height:0}
  .side-foot{margin-top:auto;padding-top:10px;border-top:1px solid var(--line)}
  aside .brand{font-size:20px;color:#fff;padding:6px 10px 16px;display:flex;align-items:center;gap:8px}
  aside nav button{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:transparent;color:var(--side-ink);padding:10px 12px;font-size:14.5px;border-radius:9px;margin-bottom:2px}
  aside nav button:hover{background:var(--side-hover)}
  aside nav button.on{background:var(--accent);color:var(--on-accent);font-weight:500}
  aside .nav-sec{font-size:10.5px;color:#5b6a8a;padding:14px 12px 5px;letter-spacing:.03em}
  aside .ico{width:20px;text-align:center}
  aside nav button svg,aside .brand svg{width:18px;height:18px}
  aside nav button svg{color:var(--side-ink)}
  aside nav button.on svg{color:var(--on-accent)}
  aside .brand svg{color:var(--accent)}
  details.acard{background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:0 1px 2px rgba(0,0,0,.22);margin-bottom:14px}
  details.acard>summary{cursor:pointer;padding:15px 20px;font-size:15px;font-weight:600;color:var(--ink);list-style:none}
  details.acard>summary::-webkit-details-marker{display:none}
  details.acard>summary::before{content:"＋ ";color:var(--accent)}
  details.acard[open]>summary::before{content:"− ";color:var(--accent)}
  details.acard .acbody{padding:0 20px 18px}

  main{flex:1;padding:26px 34px 70px;max-width:none}
  .page-h{font-size:23px;font-weight:600;letter-spacing:-.01em;margin-bottom:5px;color:var(--ink)}
  .page-sub{color:var(--muted);font-size:13.5px;margin-bottom:22px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:0 1px 2px rgba(0,0,0,.22);padding:18px 20px;margin-bottom:14px}
  .card h2{font-size:15px;font-weight:600;letter-spacing:-.005em;margin-bottom:14px;color:var(--ink)}
  .row{display:flex;gap:8px;flex-wrap:wrap}.row>*{flex:1;min-width:0}
  .row .n1{flex:0 0 130px}.row .n2{flex:0 0 100px}
  .mt{margin-top:9px}
  .addb{background:var(--accent-soft);color:var(--accent);font-weight:700;padding:10px;width:100%}
  .addb:hover{background:var(--accent);color:var(--on-accent)}
  .ghostb{background:var(--input);border:1px solid var(--line);color:var(--ink);padding:10px 14px;border-radius:9px}
  .ghostb:hover{border-color:var(--accent)}
  .ghostb.danger{color:var(--bad)}
  .linklike{background:none;border:none;color:var(--accent);font-size:12.5px;cursor:pointer;padding:2px 4px}
  .empty{color:var(--muted);text-align:center;padding:22px 0;font-size:13.5px}
  .pill{display:inline-block;font-size:11px;padding:2px 9px;border-radius:20px;background:var(--accent-soft);color:var(--accent)}

  .item{display:flex;align-items:flex-start;gap:10px;padding:11px 0;border-bottom:1px solid var(--line)}
  .item:last-child{border-bottom:none}
  .chk{width:20px;height:20px;flex:0 0 20px;border:2px solid var(--line);border-radius:6px;background:none;margin-top:2px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px}
  .chk.on{background:#3f5578;border-color:#3f5578}
  .item .bd{flex:1;min-width:0}.item .bd .t{font-weight:500}
  .item.done .bd .t{text-decoration:line-through;color:var(--muted)}
  .item.link:hover{background:#22304f;border-radius:8px}
  .meta{font-size:12px;color:var(--muted)}
  .del{background:none;color:var(--muted);font-size:17px;line-height:1;padding:0 3px}
  .del:hover{color:var(--bad)}
  .sub-tabs{display:flex;gap:6px;margin-bottom:14px}
  .sub-tabs button{background:var(--input);border:1px solid var(--line);color:var(--muted);padding:7px 14px;font-size:13px;border-radius:20px}
  .sub-tabs button.on{background:var(--accent);color:var(--on-accent);border-color:var(--accent)}
  .linkchip{display:inline-block;background:var(--input);border:1px solid var(--line);color:var(--accent);padding:8px 14px;border-radius:20px;font-size:13px;text-decoration:none}
  .linkchip:hover{border-color:var(--accent)}

  table.tbl{width:100%;border-collapse:collapse;font-size:13.5px}
  table.tbl th{text-align:left;color:var(--muted);font-weight:500;font-size:12px;padding:6px 8px;border-bottom:1px solid var(--line)}
  table.tbl td{padding:8px;border-bottom:1px solid var(--line);vertical-align:middle}
  .tblwrap{overflow-x:auto}
  .stat{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:12px}
  .stat .s{background:var(--input);border:1px solid var(--line);border-radius:12px;padding:13px 15px}
  .stat .s .lab{font-size:12px;color:var(--muted)}
  .stat .s .val{font-size:22px;font-weight:700;margin-top:3px;color:var(--accent)}

  .cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .cal-head button{background:#22314f;border:1px solid var(--line);padding:6px 12px;border-radius:8px;font-size:13px;color:var(--ink)}
  .cal-head button:hover{background:var(--accent-soft);color:var(--accent);border-color:var(--accent)}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--line);border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .cal-grid .dow{background:#17233d;text-align:center;font-size:12px;color:var(--muted);padding:7px 0}
  .cal-grid .cell{background:var(--card);min-height:82px;padding:5px 6px;font-size:12px}
  .cal-grid .cell .dn{color:var(--muted);display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;font-size:12px}
  .cal-grid .cell.today .dn{background:var(--accent);color:var(--on-accent)}
  .cal-grid .cell.out{background:#15203a}
  .cal-grid .ev{background:#2b4068;color:#dbe6f7;border-radius:5px;padding:2px 5px;margin-top:3px;font-size:11px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sort-toggle{display:flex;gap:4px}
  .sort-toggle button{background:var(--input);border:1px solid var(--line);color:var(--muted);font-size:12px;padding:5px 11px;border-radius:7px}
  .sort-toggle button.on{background:var(--accent);color:var(--on-accent);border-color:var(--accent)}

  .week-scroll{overflow-x:auto;margin:0 -2px}
  .week-grid{display:grid;gap:7px}
  .wcol{background:#172642;border:1px solid var(--line);border-radius:10px;padding:7px;min-height:104px;cursor:pointer}
  .wcol:hover{border-color:var(--accent)}
  .wcol.today{border-color:var(--accent);background:var(--card)}
  .wcol.sel{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-soft)}
  .wcol-h{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:6px;text-align:center}
  .wcol.today .wcol-h{color:var(--accent)}
  .wtask{font-size:12px;line-height:1.35;display:flex;align-items:flex-start;gap:5px;padding:4px 6px;border-radius:6px;margin-bottom:3px;background:var(--card);border:1px solid var(--line);word-break:keep-all}
  .wtask.done{opacity:.5;text-decoration:line-through}
  .pdot{width:8px;height:8px;border-radius:50%;flex:0 0 8px;margin-top:4px}
  .wempty{color:#566688;font-size:11px;text-align:center;padding:4px 0}
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(max-width:760px){
    .two-col{grid-template-columns:1fr}
    .topbar{display:flex}
    aside{position:fixed;left:0;top:0;width:90%;max-width:360px;height:100vh;transform:translateX(-100%);transition:transform .22s ease;z-index:60;padding:14px 16px}
    aside.open{transform:translateX(0)}
    .side-close{display:block;position:absolute;top:14px;right:16px;background:transparent;border:none;color:var(--side-ink);padding:6px;cursor:pointer}
    .side-close svg{width:26px;height:26px}
    .side-collapse{display:none}
    aside nav{display:grid;grid-template-columns:1fr 1fr;gap:6px;align-content:start}
    aside nav .nav-sec{grid-column:1/-1;padding-top:8px}
    aside nav>button:first-of-type{grid-column:1/-1}
    aside nav button{padding:12px 12px;font-size:15.5px}
    main{padding:14px 14px 60px;max-width:100%}
    .page-h{font-size:20px}
    .card{padding:15px 16px}
    .row .n1,.row .n2{flex:1 1 46%}
    .sub-tabs{flex-wrap:wrap}
    .stat{grid-template-columns:1fr 1fr}
    .cal-grid .cell{min-height:60px;font-size:11px}
  }
</style>
</head>
<body>
<div id="lock" class="lock">
  <div class="lock-card">
    <div class="lock-logo"><i data-lucide="lock"></i></div>
    <h1>업무관리</h1>
    <p>비밀번호를 입력하세요</p>
    <input type="password" id="lockpw" inputmode="numeric" placeholder="비밀번호" />
    <button id="lockbtn">들어가기</button>
    <div id="lockmsg" class="lock-msg"></div>
  </div>
</div>
<header class="topbar"><button class="hamb" onclick="toggleMenu()" aria-label="메뉴"><i data-lucide="menu"></i></button><span class="tb-title">업무관리</span></header>
<div class="backdrop" id="backdrop" onclick="toggleMenu()"></div>
<div class="layout">
  <aside>
    <button class="side-close" onclick="toggleMenu()" aria-label="닫기"><i data-lucide="x"></i></button>
    <div class="brand"><i data-lucide="sprout"></i> <span>업무관리</span><button class="side-collapse" onclick="toggleMenu()" aria-label="메뉴 접기/펼치기"><i data-lucide="panel-left"></i></button></div>
    <nav id="nav">
      <button data-p="dashboard" class="on"><i class="ico" data-lucide="layout-dashboard"></i><span class="lab">대시보드</span></button>
      <div class="nav-sec">개인</div>
      <button data-p="schedule"><i class="ico" data-lucide="calendar-check"></i><span class="lab">일정</span></button>
      <button data-p="calendar"><i class="ico" data-lucide="calendar"></i><span class="lab">캘린더</span></button>
      <button data-p="diary"><i class="ico" data-lucide="book"></i><span class="lab">일기</span></button>
      <button data-p="goals"><i class="ico" data-lucide="target"></i><span class="lab">목표</span></button>
      <button data-p="faith"><i class="ico" data-lucide="heart"></i><span class="lab">신앙</span></button>
      <div class="nav-sec">업무</div>
      <button data-p="clients"><i class="ico" data-lucide="users"></i><span class="lab">클라이언트</span></button>
      <button data-p="costs"><i class="ico" data-lucide="wallet"></i><span class="lab">비용관리</span></button>
      <div class="nav-sec">기록 · 관리</div>
      <button data-p="retro"><i class="ico" data-lucide="history"></i><span class="lab">회고</span></button>
      <button data-p="books"><i class="ico" data-lucide="book-open"></i><span class="lab">독서노트</span></button>
      <button data-p="notes"><i class="ico" data-lucide="sticky-note"></i><span class="lab">노트</span></button>
      <button data-p="accounts"><i class="ico" data-lucide="lock"></i><span class="lab">계정관리</span></button>
      <button data-p="backup"><i class="ico" data-lucide="database-backup"></i><span class="lab">백업</span></button>
    </nav>
    <div class="side-foot">
      <div style="padding:0 6px"><button class="del" id="logout" style="font-size:12px;color:#6a7a9a">로그아웃</button></div>
    </div>
  </aside>
  <main id="main"></main>
</div>
<div class="copyright-fixed">© 2026 배재혁</div>

if(!DB.accounts)DB.accounts=[];if(!DB.places)DB.places=[];if(!DB.banks)DB.banks=[];if(!DB.costs)DB.costs=[];if(!DB.notes)DB.notes=[];if(!DB.sermons)DB.sermons=[];
let _saveT;function save(){clearTimeout(_saveT);_saveT=setTimeout(()=>{if(sb&&currentUser)sb.from("app_data").upsert({user_id:currentUser.id,data:DB,updated_at:new Date().toISOString()}).then(null,e=>console.warn("save",e));},700);}
function esc(s){return (s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function fmt(d){if(!d)return"";const x=new Date(d+"T00:00:00");const w=["일","월","화","수","목","금","토"];return `${x.getMonth()+1}월 ${x.getDate()}일 (${w[x.getDay()]})`;}
function val(id){return document.getElementById(id).value.trim();}
const main=document.getElementById("main");
const DOW=["일","월","화","수","목","금","토"];

/* ===== 네비게이션 ===== */
let page="dashboard";
window.toggleMenu=()=>{
  if(window.innerWidth<=760){document.querySelector("aside").classList.toggle("open");document.getElementById("backdrop").classList.toggle("show");}
  else{document.querySelector(".layout").classList.toggle("collapsed");}
};
function closeMenu(){document.querySelector("aside").classList.remove("open");document.getElementById("backdrop").classList.remove("show");}
document.querySelectorAll("#nav button").forEach(b=>b.onclick=()=>{

function render(){({dashboard:rDashboard,schedule:rSchedule,calendar:rCalendar,diary:rDiary,goals:rGoals,faith:rFaith,clients:rClients,costs:rCosts,retro:rRetro,books:rBooks,notes:rNotes,accounts:rAccounts,backup:rBackup}[page])();}

/* ===== 0) 대시보드 ===== */
function rDashboard(){
  const today=T();
  const todayTasks=DB.schedules.map((s,i)=>({s,i})).filter(o=>o.s.date===today).sort((a,b)=>(a.s.done-b.s.done)||((a.s.time||"99:99").localeCompare(b.s.time||"99:99")));
  const ws=weekStart(today);const wdays=[...Array(7)].map((_,i)=>{const x=new Date(ws);x.setDate(ws.getDate()+i);return x.toLocaleDateString("sv-SE");});
  const wkTasks=DB.schedules.filter(s=>wdays.includes(s.date));
  const wkRate=wkTasks.length?Math.round(wkTasks.filter(s=>s.done).length/wkTasks.length*100):0;
  const tdRate=todayTasks.length?Math.round(todayTasks.filter(o=>o.s.done).length/todayTasks.length*100):0;
  const curM=new Date().getMonth()+1;
  const dueThis=DB.clients.filter(c=>recontractMonth(c.recontract)===curM);
  const ym=today.slice(0,7);
  const monthMains=Object.entries(DB.dayinfo).filter(([d,v])=>d.slice(0,7)===ym&&v.main&&v.main.trim()).sort((a,b)=>a[0].localeCompare(b[0]));
  const wname=DOW[new Date(today+"T00:00:00").getDay()];
  const tdDone=todayTasks.filter(o=>o.s.done).length;
  const nextM=curM===12?1:curM+1;
  const dueNext=DB.clients.filter(c=>recontractMonth(c.recontract)===nextM);
  const C=2*Math.PI*50;
  const bars=wdays.map(d=>{const items=DB.schedules.filter(s=>s.date===d);const done=items.filter(s=>s.done).length;const r=items.length?Math.round(done/items.length*100):0;const isT=d===today;const dt=new Date(d+"T00:00:00");
    return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;justify-content:flex-end">
      <div class="meta" style="font-size:10px;color:${isT?"var(--accent)":"var(--muted)"}">${r}%</div>
      <div style="width:60%;height:${Math.max(r,3)}px;background:${isT?"var(--accent)":"#2c3f66"};border-radius:5px 5px 0 0"></div>
      <div class="meta" style="font-size:10px;color:${isT?"var(--accent)":"var(--muted)"}">${DOW[dt.getDay()]}</div></div>`;}).join("");
  main.innerHTML=`<h1 class="page-h">대시보드</h1><p class="page-sub">${new Date().getMonth()+1}월 ${new Date().getDate()}일 (${wname})</p>
  <div style="border-left:3px solid var(--accent);padding:9px 0 9px 16px;margin-bottom:20px;color:var(--ink);font-size:14px;line-height:1.8;font-family:'Gowun Dodum',sans-serif">
    휴식은 아기들을 위한 것이고 여유는 은퇴자를 위한 것이다<br>부족한 건 시간이 아니라 강력한 비전이다<br><span style="color:var(--accent);font-size:13px">— 아놀드 슈워제네거</span></div>
  <div class="two-col">
    <div class="card" style="display:flex;align-items:center;gap:18px">
      <svg width="112" height="112" viewBox="0 0 120 120" style="flex:0 0 112px">
        <circle cx="60" cy="60" r="50" fill="none" stroke="var(--line)" stroke-width="11"/>
        <circle cx="60" cy="60" r="50" fill="none" stroke="var(--accent)" stroke-width="11" stroke-linecap="round" stroke-dasharray="${C}" stroke-dashoffset="${C*(1-tdRate/100)}" transform="rotate(-90 60 60)"/>
        <text x="60" y="60" text-anchor="middle" dominant-baseline="central" fill="var(--ink)" font-size="26" font-weight="700">${tdRate}%</text></svg>
      <div><div style="font-size:15px;font-weight:600">오늘 달성률</div>
        <div class="meta" style="margin-top:5px">완료 ${tdDone} · 남은 할 일 <b style="color:var(--accent)">${todayTasks.length-tdDone}</b></div>
        <button class="linklike" style="padding:0;margin-top:7px" onclick="goPage('schedule')">일정으로 가기 ›</button></div></div>
    <div class="card"><div style="display:flex;align-items:center"><h2 style="flex:1;margin:0">이번 주 달성률</h2><span class="meta">평균 ${wkRate}%</span></div>
      <div style="display:flex;align-items:flex-end;gap:8px;margin-top:14px;min-height:112px">${bars}</div></div></div>
  <div class="two-col">
    <div class="card"><div style="display:flex;align-items:center"><h2 style="flex:1;margin:0">오늘 일정 <span class="meta" style="font-weight:400">· 시간순</span></h2><button class="linklike" onclick="goPage('schedule')">더보기 ›</button></div>
      <div class="mt">${todayTasks.length?todayTasks.map(({s,i})=>`<div class="item ${s.done?"done":""}"><button class="chk ${s.done?"on":""}" onclick="tg('schedules',${i},'done')">${s.done?"✓":""}</button><div class="bd"><div class="t">${esc(s.title)}</div><div class="meta">${s.time?`<b>${s.time}</b> · `:""}<span style="color:${PRI[s.priority||4].c}">${PRI[s.priority||4].t}</span></div></div></div>`).join(""):'<div class="empty">오늘 일정이 없어요.</div>'}</div></div>
    <div>
      <div class="card"><div style="display:flex;align-items:center"><h2 style="flex:1;margin:0">이번 주</h2><button class="linklike" onclick="goPage('schedule')">›</button></div>
        <div class="mt">${wdays.map(d=>{const dt=new Date(d+"T00:00:00");const items=DB.schedules.filter(s=>s.date===d);const done=items.filter(s=>s.done).length;const isT=d===today;
          return `<div class="item" style="padding:8px 0"><div class="bd"><div class="t" style="font-size:13.5px;${isT?"color:var(--accent)":""}">${dt.getDate()}일 ${DOW[dt.getDay()]}</div></div><span class="meta" style="align-self:center">${items.length?`${done}/${items.length}`:"—"}</span></div>`;}).join("")}</div></div>
      <div class="card"><div style="display:flex;align-items:center"><h2 style="flex:1;margin:0">${curM}월 주요 일정</h2><button class="linklike" onclick="goPage('calendar')">›</button></div>
        <div class="mt">${monthMains.length?monthMains.slice(0,5).map(([d,v])=>`<div class="item" style="padding:8px 0"><div class="bd"><div class="meta" style="color:var(--accent)">${fmt(d)}</div><div style="font-size:13.5px">${esc(v.main)}</div></div></div>`).join(""):'<div class="empty">주요 일정이 없어요.</div>'}</div></div></div></div>
  <div class="stat">
    <div class="s" style="cursor:pointer" onclick="goPage('clients')"><div class="lab">클라이언트</div><div class="val" style="font-size:18px">${DB.clients.length}명</div></div>
    <div class="s" style="cursor:pointer" onclick="goPage('clients')"><div class="lab">${curM}월 재계약</div><div class="val" style="font-size:18px">${dueThis.length}명</div></div>
    <div class="s" style="cursor:pointer" onclick="goPage('clients')"><div class="lab">${nextM}월 재계약</div><div class="val" style="font-size:18px">${dueNext.length}명</div></div>
    <div class="s" style="cursor:pointer" onclick="goPage('goals')"><div class="lab">목표 평균 진행률</div><div class="val" style="font-size:18px">${DB.goals.length?Math.round(DB.goals.reduce((a,g)=>a+(g.progress||0),0)/DB.goals.length):0}%</div></div></div>`;
}

/* ===== 1) 일정 (주간 보기 · 날짜 선택 · 반응형) ===== */
const PRI={1:{t:"1순위",c:"#c47b71"},2:{t:"2순위",c:"#c99a66"},3:{t:"3순위",c:"#6b9fc0"},4:{t:"4순위",c:"#8090ad"}};
let selDay=null;
function isMobile(){return window.innerWidth<=760;}
function weekStart(ds){const d=new Date(ds+"T00:00:00");const k=(d.getDay()+6)%7;d.setDate(d.getDate()-k);return d;}
function fmtShort(ds){const x=new Date(ds+"T00:00:00");return `${x.getMonth()+1}.${x.getDate()}`;}
function rSchedule(){
  if(!selDay)selDay=T();
  const mob=isMobile();
  let days;
  if(mob){days=[selDay];}
  else{const ws=weekStart(selDay);days=[...Array(7)].map((_,i)=>{const x=new Date(ws);x.setDate(ws.getDate()+i);return x.toLocaleDateString("sv-SE");});}
  const label = mob ? fmt(days[0]) : `${fmtShort(days[0])} ~ ${fmtShort(days[6])}`;
  const step = mob ? 1 : 7;
  const dsel=new Date(selDay+"T00:00:00");
  const dayLabel = selDay===T() ? "오늘" : `${dsel.getMonth()+1}월 ${dsel.getDate()}일`;
  const di=DB.dayinfo[selDay]||{};
  const rate=(list)=>list.length?Math.round(list.filter(s=>s.done).length/list.length*100):0;
  const ws2=weekStart(selDay);const weekDays=[...Array(7)].map((_,i)=>{const x=new Date(ws2);x.setDate(ws2.getDate()+i);return x.toLocaleDateString("sv-SE");});
  const weekRate=rate(DB.schedules.filter(s=>weekDays.includes(s.date)));
  const dayRate=rate(DB.schedules.filter(s=>s.date===selDay));
  main.innerHTML=`<h1 class="page-h">일정</h1><p class="page-sub">${mob?"하루씩 넘겨보며 정리해요.":"이번 주 업무를 한눈에 보고 정리해요."}</p>
  <div class="card"><div class="cal-head">
      <button onclick="weekMove(${-step})">${mob?"‹ 이전날":"‹ 이전주"}</button>
      <h2 style="margin:0">${label}</h2>
      <button onclick="weekMove(${step})">${mob?"다음날 ›":"다음주 ›"}</button></div>
    <div class="week-scroll"><div class="week-grid" style="grid-template-columns:repeat(${days.length},minmax(${mob?"100%":"130px"},1fr))">${days.map(weekCol).join("")}</div></div>
    <div style="display:flex;gap:18px;margin-top:12px;font-size:12.5px;color:var(--muted)"><span>이번주 달성률 <b style="color:var(--accent)">${weekRate}%</b></span><span>${dayLabel} 달성률 <b style="color:var(--accent)">${dayRate}%</b></span></div></div>
  <div class="card"><h2>${dayLabel} 주요업무</h2>
    <textarea id="daymain" rows="2" placeholder="이 날의 핵심 일정·업무를 적어두세요 (예: 11시 스터디, 14시 회의)" onchange="setMain(this.value)">${esc((DB.dayinfo[selDay]||{}).main||"")}</textarea></div>
  <details class="acard"><summary>업무 추가</summary><div class="acbody">
    <div class="row"><input type="date" id="sd" class="n1" value="${selDay}"><input type="time" id="stime" class="n2"><input id="stt" placeholder="업무 내용"></div>
    <div class="row mt"><select id="spri" class="n1">
        <option value="1">1순위</option><option value="2">2순위</option><option value="3">3순위</option><option value="4" selected>4순위</option></select>
      <input id="snote" placeholder="비고 (선택)">
      <button class="addb" id="sadd" style="flex:0 0 84px">+ 추가</button></div></div></details>
  <div class="card">
    <div style="display:flex;align-items:center;margin-bottom:12px"><h2 style="flex:1;margin:0">${dayLabel} 업무</h2>
      <div class="sort-toggle"><button class="${todaySort==="pri"?"on":""}" onclick="setTodaySort('pri')">우선순위순</button><button class="${todaySort==="time"?"on":""}" onclick="setTodaySort('time')">시간순</button></div></div>
    <div id="tlist"></div></div>
  <div class="card"><h2>${dayLabel} 메모</h2><textarea rows="3" placeholder="메모를 적어두세요" onchange="setDayField('memo',this.value)">${esc(di.memo||"")}</textarea></div>
  <div class="card"><h2>${dayLabel} 회고</h2><textarea rows="3" placeholder="오늘 하루를 돌아보며 회고를 적어보세요" onchange="setDayField('retro',this.value)">${esc(di.retro||"")}</textarea></div>`;
  document.getElementById("sadd").onclick=()=>{
    const t=val("stt");if(!t)return alert("업무 내용을 입력하세요.");
    DB.schedules.push({date:val("sd")||selDay,time:val("stime"),title:t,priority:parseInt(val("spri")),done:false,note:val("snote")});
    save();render();
  };
  drawDay();
}
window.weekMove=(d)=>{const x=new Date(selDay+"T00:00:00");x.setDate(x.getDate()+d);selDay=x.toLocaleDateString("sv-SE");rSchedule();};
window.selectDay=(d)=>{selDay=d;rSchedule();};
window.setMain=(v)=>{if(!DB.dayinfo[selDay])DB.dayinfo[selDay]={};DB.dayinfo[selDay].main=v;save();};
window.setDayField=(f,v)=>{if(!DB.dayinfo[selDay])DB.dayinfo[selDay]={};DB.dayinfo[selDay][f]=v;save();};
function weekCol(d){
  const isT=d===T();const isSel=d===selDay;const dt=new Date(d+"T00:00:00");
  const items=DB.schedules.map((s,i)=>({s,i})).filter(o=>o.s.date===d).sort(byPri);
  const r=items.length?Math.round(items.filter(o=>o.s.done).length/items.length*100):null;
  return `<div class="wcol ${isT?"today":""} ${isSel?"sel":""}" onclick="selectDay('${d}')">
    <div class="wcol-h">${dt.getDate()}일 ${DOW[dt.getDay()]}${r!==null?` · <span style="color:var(--accent)">${r}%</span>`:""}</div>
    ${items.length?items.map(({s})=>`<div class="wtask ${s.done?"done":""}"><span class="pdot" style="background:${PRI[s.priority||4].c}"></span>${s.time?`<b style="font-weight:500;color:var(--muted)">${s.time}</b> `:""}${esc(s.title)}</div>`).join(""):'<div class="wempty">—</div>'}</div>`;
}
const byPri=(a,b)=>(a.s.done-b.s.done)||((a.s.priority||4)-(b.s.priority||4));
const byTime=(a,b)=>(a.s.done-b.s.done)||((a.s.time||"99:99").localeCompare(b.s.time||"99:99"));
function taskRows(items){
  return items.length?items.map(({s,i})=>{const p=PRI[s.priority||4];
    return `<div class="item ${s.done?"done":""}">
      <button class="chk ${s.done?"on":""}" onclick="tg('schedules',${i},'done')">${s.done?"✓":""}</button>
      <div class="bd"><div class="t">${esc(s.title)}</div>
        <div class="meta">${s.time?`<b>${s.time}</b> · `:""}<span style="color:${p.c};font-weight:500">${p.t}</span>${s.note?" · "+esc(s.note):""}</div></div>
      <button class="del" onclick="rm('schedules',${i})">×</button></div>`;}).join(""):'<div class="empty">이 날 업무가 없어요.</div>';
}
let todaySort="pri";
function drawDay(){
  const items=DB.schedules.map((s,i)=>({s,i})).filter(o=>o.s.date===selDay);
  document.getElementById("tlist").innerHTML=taskRows([...items].sort(todaySort==="time"?byTime:byPri));
}
window.setTodaySort=(s)=>{todaySort=s;rSchedule();};

/* ===== 2) 캘린더 ===== */
let calY,calM;
function rCalendar(){
  const now=new Date();if(calY==null){calY=now.getFullYear();calM=now.getMonth();}
  const ym=`${calY}-${String(calM+1).padStart(2,"0")}`;
  const mob=isMobile();
  main.innerHTML=`<h1 class="page-h">캘린더</h1><p class="page-sub">이 달의 일정을 한눈에.</p>
  <div class="card"><div class="cal-head">
    <button onclick="calMove(-1)">‹ 이전</button>
    <h2 style="margin:0">${calY}년 ${calM+1}월</h2>
    <button onclick="calMove(1)">다음 ›</button></div>
    ${mob?`<div id="cg"></div>`:`<div class="cal-grid" id="cg"></div>`}</div>
  <div class="card"><h2>${calM+1}월 주요 메모</h2>
    <textarea id="mmemo" rows="4" placeholder="이번 달 중요한 것을 메모해두세요" onchange="setMonthMemo(this.value)">${esc(DB.monthmemo[ym]||"")}</textarea></div>`;
  mob?drawCalList():drawCal();
}
function drawCalList(){
  const g=document.getElementById("cg");const days=new Date(calY,calM+1,0).getDate();const rows=[];
  for(let d=1;d<=days;d++){const ds=`${calY}-${String(calM+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;const m=(DB.dayinfo[ds]||{}).main;if(m&&m.trim())rows.push({ds,d,m});}
  g.innerHTML=rows.length?rows.map(r=>{const dt=new Date(r.ds+"T00:00:00");const isT=r.ds===T();return `<div class="item"><div class="bd"><div class="meta" style="color:${isT?"var(--accent)":"var(--muted)"}">${r.d}일 (${DOW[dt.getDay()]})</div><div style="margin-top:2px">${esc(r.m)}</div></div></div>`;}).join(""):'<div class="empty">이 달 주요 일정이 없어요.<br>일정 화면에서 주요업무를 적으면 여기 표시돼요.</div>';
}
window.calMove=(d)=>{calM+=d;if(calM<0){calM=11;calY--;}if(calM>11){calM=0;calY++;}rCalendar();};
window.setMonthMemo=(v)=>{const ym=`${calY}-${String(calM+1).padStart(2,"0")}`;DB.monthmemo[ym]=v;save();};
function drawCal(){
  const g=document.getElementById("cg");
  let html=DOW.map(d=>`<div class="dow">${d}</div>`).join("");
  const first=new Date(calY,calM,1).getDay();const days=new Date(calY,calM+1,0).getDate();
  const prev=new Date(calY,calM,0).getDate();
  for(let i=0;i<first;i++){html+=`<div class="cell out"><div class="dn">${prev-first+i+1}</div></div>`;}
  for(let d=1;d<=days;d++){
    const ds=`${calY}-${String(calM+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const isT=ds===T();
    const mtxt=(DB.dayinfo[ds]||{}).main;
    html+=`<div class="cell ${isT?"today":""}"><div class="dn">${d}</div>${mtxt?`<div class="ev" style="white-space:normal;border-left:3px solid var(--accent)">${esc(mtxt)}</div>`:""}</div>`;
  }
  g.innerHTML=html;
}

/* ===== 3) 일기 (게시판식 · 연/월 필터) ===== */
let diaryMode="list", diarySel=null, diaryYear=null, diaryMonth="all";
function rDiary(){
  if(diaryYear===null)diaryYear=String(new Date().getFullYear());
  if(diaryMode==="write")return diaryWrite();
  if(diaryMode==="detail")return diaryDetail();
  const years=[...new Set(DB.diary.map(d=>d.date.slice(0,4)).concat(String(new Date().getFullYear())))].sort().reverse();
  const list=DB.diary.filter(d=>d.date.slice(0,4)===String(diaryYear)&&(diaryMonth==="all"||d.date.slice(5,7)===diaryMonth))
    .sort((a,b)=>b.date.localeCompare(a.date));
  main.innerHTML=`<h1 class="page-h">일기</h1><p class="page-sub">날짜별로 기록을 남겨요.</p>
  <div class="card"><div class="row" style="align-items:center">
      <select class="n2" onchange="setDiaryYear(this.value)" style="flex:0 0 110px">${years.map(y=>`<option value="${y}" ${y===String(diaryYear)?"selected":""}>${y}년</option>`).join("")}</select>
      <select class="n2" onchange="setDiaryMonth(this.value)" style="flex:0 0 110px"><option value="all" ${diaryMonth==="all"?"selected":""}>전체 월</option>${[...Array(12)].map((_,i)=>{const m=String(i+1).padStart(2,"0");return `<option value="${m}" ${diaryMonth===m?"selected":""}>${i+1}월</option>`;}).join("")}</select>
      <span style="flex:1"></span>
      <button class="addb" style="flex:0 0 130px" onclick="diaryNew()">✏️ 일기 쓰기</button></div></div>
  <div class="card"><h2>지난 일기</h2>${list.length?list.map(d=>`
    <div class="item link" style="cursor:pointer" onclick="diaryOpen('${d.id}')">
      <div class="bd"><div class="meta">${fmt(d.date)}</div><div class="t">${esc(d.title)}</div></div>
      <span class="meta" style="align-self:center">›</span></div>`).join(""):'<div class="empty">이 기간에 쓴 일기가 없어요.</div>'}</div>`;
}
window.setDiaryYear=(v)=>{diaryYear=v;rDiary();};
window.setDiaryMonth=(v)=>{diaryMonth=v;rDiary();};
window.diaryNew=()=>{diaryMode="write";rDiary();};
window.diaryOpen=(id)=>{diaryMode="detail";diarySel=id;rDiary();};
window.diaryBack=()=>{diaryMode="list";rDiary();};
function diaryWrite(){
  main.innerHTML=`<h1 class="page-h">일기 쓰기</h1><p class="page-sub">오늘 하루를 기록해요.</p>
  <div class="card">
    <div class="row"><input type="date" id="dd" class="n1" value="${T()}"><input id="dt" placeholder="제목"></div>
    <textarea id="dc" class="mt" rows="9" placeholder="오늘 하루는 어땠나요?"></textarea>
    <div class="row mt"><button class="addb" id="dsave">저장</button><button class="ghostb" style="flex:0 0 90px" onclick="diaryBack()">취소</button></div></div>`;
  document.getElementById("dsave").onclick=()=>{
    const c=val("dc");if(!c)return alert("내용을 입력하세요.");

        ${c.sheet?`<a href="${esc(c.sheet)}" target="_blank" rel="noopener" style="color:var(--accent)">문의시트 ↗</a>`:`<button class="linklike" onclick="setSheet(${i})">＋문의시트</button>`} &nbsp;

      <td>${c.clink?`<a href="${esc(c.clink)}" target="_blank" rel="noopener" style="color:var(--accent)">바로가기 ↗</a>`:`<button class="linklike" onclick="setClink(${i})">＋ 링크추가</button>`}</td>

function weeklyPosts(cycle){
  if(!cycle)return 0;
  const days=(cycle.match(/[월화수목금토일]/g)||[]).length;
  if(days)return days;
  const m=cycle.match(/(\d+)\s*회/)||cycle.match(/(\d+)/);
  return m?parseInt(m[1]):0;
}
function recontractMonth(s){
  if(!s)return null;
  const iso=s.match(/^\d{4}-(\d{2})-\d{2}/);
  if(iso)return parseInt(iso[1]);
  const m=s.match(/(\d{1,2})[.\-\/]/);
  return m?parseInt(m[1]):null;
}
function recDisp(s){if(!s)return"-";const m=s.match(/^\d{4}-(\d{2})-(\d{2})/);return m?`${+m[1]}.${+m[2]}`:s;}
function drawSummary(){
  const el=document.getElementById("csummary");if(!el)return;
  const n=DB.clients.length;
  const weekly=DB.clients.reduce((a,c)=>a+weeklyPosts(c.cycle),0);
  const monthly=weekly*4;
  const curM=new Date().getMonth()+1;
  const nextM=curM===12?1:curM+1;
  const due=DB.clients.filter(c=>recontractMonth(c.recontract)===curM);
  const dueNext=DB.clients.filter(c=>recontractMonth(c.recontract)===nextM);
  el.innerHTML=`
    <div class="stat">
      <div class="s"><div class="lab">현재 클라이언트</div><div class="val">${n}명</div></div>
      <div class="s"><div class="lab">주간 포스트</div><div class="val">${weekly}개</div></div>
      <div class="s"><div class="lab">월간 포스트</div><div class="val">${monthly}개</div></div>
      <div class="s"><div class="lab">${curM}월 재계약</div><div class="val">${due.length}명</div></div>
      <div class="s"><div class="lab">${nextM}월 재계약</div><div class="val">${dueNext.length}명</div></div>
    </div>
    <div class="meta">📌 ${curM}월 재계약 대상: ${due.length?due.map(c=>esc(c.name)).join(", "):"없음"}</div>
    <div class="meta" style="margin-top:4px">📌 ${nextM}월 재계약 대상: ${dueNext.length?dueNext.map(c=>esc(c.name)).join(", "):"없음"}</div>`;
}
window.setSheet=(i)=>{const u=prompt("문의시트 링크를 붙여넣으세요 (https://...)",DB.clients[i].sheet||"");if(u!==null){DB.clients[i].sheet=u.trim();save();drawC();}};
window.setClink=(i)=>{const u=prompt("클라이언트 링크를 붙여넣으세요 (https://...)",DB.clients[i].clink||"");if(u!==null){DB.clients[i].clink=u.trim();save();drawC();}};

function rRetro(){

  const years=[...new Set(Object.keys(DB.dayinfo).map(d=>d.slice(0,4)).concat(String(new Date().getFullYear())))].sort().reverse();
  main.innerHTML=`<h1 class="page-h">회고</h1><p class="page-sub">일정 화면에서 적은 회고를 연도별로 모아봐요.</p>

      <select class="n2" onchange="setRetroYear(this.value)" style="flex:0 0 120px">${years.map(y=>`<option value="${y}" ${y===String(retroYear)?"selected":""}>${y}년</option>`).join("")}</select>

/* ===== 백업 (하루 1회 자동 · 30일 보관) ===== */
function snapshotData(){const c={...DB};delete c.backups;return JSON.stringify(c);}
function fmtDT(iso){const x=new Date(iso);return `${x.getMonth()+1}월 ${x.getDate()}일 (${DOW[x.getDay()]}) ${String(x.getHours()).padStart(2,"0")}:${String(x.getMinutes()).padStart(2,"0")}`;}
function pruneBackups(){DB.backups.sort((a,b)=>b.ts.localeCompare(a.ts));if(DB.backups.length>30)DB.backups=DB.backups.slice(0,30);}
function autoBackup(){DB.backups=DB.backups||[];const today=T();if(!DB.backups.some(b=>b.ts.slice(0,10)===today)){DB.backups.push({id:uid(),ts:new Date().toISOString(),data:snapshotData()});pruneBackups();save();}}
function rBackup(){
  const list=[...(DB.backups||[])].sort((a,b)=>b.ts.localeCompare(a.ts));
  main.innerHTML=`<h1 class="page-h">백업</h1><p class="page-sub">앱을 열 때 하루 1회 자동 저장 · 최근 30일 보관</p>
  <div class="card"><div style="display:flex;align-items:center"><h2 style="flex:1;margin:0">저장된 버전</h2><button class="ghostb" onclick="backupNow()">지금 백업</button></div>
    <div class="mt">${list.length?list.map(b=>`<div class="item"><div class="bd"><div class="t">${fmtDT(b.ts)}</div><div class="meta">${(b.data.length/1024).toFixed(1)} KB</div></div>
      <button class="ghostb" style="padding:6px 12px" onclick="restoreBackup('${b.id}')">복원</button>
      <button class="del" onclick="delBackup('${b.id}')">×</button></div>`).join(""):'<div class="empty">백업이 아직 없어요.</div>'}</div></div>`;
}
window.backupNow=()=>{DB.backups=DB.backups||[];DB.backups.push({id:uid(),ts:new Date().toISOString(),data:snapshotData()});pruneBackups();save();rBackup();};
window.delBackup=(id)=>{if(!confirm("이 백업을 삭제할까요?"))return;DB.backups=DB.backups.filter(b=>b.id!==id);save();rBackup();};
window.restoreBackup=(id)=>{const b=(DB.backups||[]).find(x=>x.id===id);if(!b)return;if(!confirm(fmtDT(b.ts)+" 시점으로 복원할까요? 현재 데이터가 이 버전으로 덮어써져요."))return;const d=JSON.parse(b.data);Object.keys(d).forEach(k=>{DB[k]=d[k];});save();alert("복원됐어요.");location.reload();};

/* ===== 공통 ===== */
window.tg=(arr,i,f)=>{DB[arr][i][f]=!DB[arr][i][f];save();render();};
window.rm=(arr,i)=>{DB[arr].splice(i,1);save();render();};
let rz;window.addEventListener("resize",()=>{if(page==="schedule"){clearTimeout(rz);rz=setTimeout(rSchedule,150);}});
window.addEventListener("resize",()=>{const L=document.querySelector(".layout");if(window.innerWidth<=760){L.classList.remove("collapsed");}else{const a=document.querySelector("aside");a.classList.remove("open");const bd=document.getElementById("backdrop");if(bd)bd.classList.remove("show");}});
document.addEventListener("click",e=>{const t=e.target;if(t.tagName==="INPUT"&&(t.type==="date"||t.type==="time")){try{t.showPicker&&t.showPicker();}catch(_){}}});

/* ===== Supabase 로그인 + 데이터 로드 ===== */
async function boot(pw){
  const {data,error}=await sb.auth.signInWithPassword({email:USER_EMAIL,password:pw});
  if(error)return false;
  currentUser=data.user;
  const ARR=["schedules","diary","goals","prayers","qt","sermons","clients","costs","notes","books","accounts","places","banks","backups"];
  let loaded=false;
  try{const r=await sb.from("app_data").select("data").eq("user_id",currentUser.id).maybeSingle();
    if(r.data&&r.data.data){const d=r.data.data;Object.keys(d).forEach(k=>{DB[k]=d[k];});loaded=true;}}catch(_){}
  if(!loaded){ARR.forEach(k=>{DB[k]=[];});DB.dayinfo={};DB.monthmemo={};}
  else{["dayinfo","monthmemo"].forEach(k=>{if(!DB[k])DB[k]={};});ARR.forEach(k=>{if(!DB[k])DB[k]=[];});}
  document.getElementById("lock").style.display="none";
  autoBackup();
  render();
  if(window.lucide)lucide.createIcons();
  return true;
}
(function(){
  const inp=document.getElementById("lockpw"),btn=document.getElementById("lockbtn"),msg=document.getElementById("lockmsg");
  const go=async()=>{btn.disabled=true;msg.textContent="확인 중...";const ok=await boot(inp.value);if(!ok){msg.textContent="비밀번호가 틀렸어요.";inp.value="";btn.disabled=false;inp.focus();}};
  btn.onclick=go;inp.addEventListener("keydown",e=>{if(e.key==="Enter")go();});inp.focus();
})();
if(window.lucide)lucide.createIcons();
</script>
